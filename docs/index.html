<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioRest — Testiraportit</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0D1117;
            color: #E8EDF5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
        }

        h1 {
            font-size: 28px;
            color: #10D4A0;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #8A9BB0;
            margin-bottom: 40px;
        }

        .report-card {
            background: #161C26;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            transition: border-color 0.15s;
        }

        .report-card:hover {
            border-color: #10D4A0;
        }

        .report-info h2 {
            font-size: 16px;
            color: #E8EDF5;
            margin: 0 0 4px 0;
        }

        .report-info p {
            font-size: 13px;
            color: #8A9BB0;
            margin: 0;
        }

        .badge {
            background: rgba(16, 212, 160, 0.12);
            color: #10D4A0;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #8A9BB0;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>CardioRest</h1>
        <p class="subtitle">Automaatiotestien raportit — Robot Framework</p>

        <a class="report-card" href="report_iteraatio1.html">
            <div class="report-info">
                <h2>Iteraatio 1 — Kirjautuminen + API</h2>
                <p>Kirjautuminen, HRV-data, profiili, tietoturva</p>
            </div>
            <span class="badge">✅ 7/7</span>
        </a>

        <a class="report-card" href="report_iteraatio2.html">
            <div class="report-info">
                <h2>Iteraatio 2 — Päiväkirja</h2>
                <p>Päiväkirjamerkinnän luonti, haku, tietoturva</p>
            </div>
            <span class="badge">✅ 10/10</span>
        </a>

        <p class="footer">Ohjelmistotestaus | Ryhmä 1</p>
    </div>
</body>

</html>
